services:
  hotfuzz:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: hotfuzz-runner:local
    environment:
      HOTFUZZ_BUILD_DIR: /workspace/.hotfuzz-build
      HOTFUZZ_OUTPUT_DIR: /workspace/hotfuzz_output
      HOTFUZZ_BUILD_TYPE: ${HOTFUZZ_BUILD_TYPE:-Release}
      HOTFUZZ_CXX_FLAGS: ${HOTFUZZ_CXX_FLAGS:-}
      HOTFUZZ_EXE_LINKER_FLAGS: ${HOTFUZZ_EXE_LINKER_FLAGS:-}
      HOTFUZZ_RUN_UID: ${HOTFUZZ_RUN_UID:-1000}
      HOTFUZZ_RUN_GID: ${HOTFUZZ_RUN_GID:-1000}
    volumes:
      - type: bind
        source: ${HOTFUZZ_MAIN_CPP:?Set HOTFUZZ_MAIN_CPP in deploy/.env}
        target: /workspace/main.cpp
        read_only: true
      - type: bind
        source: ${HOTFUZZ_RECORDER_DIR:?Set HOTFUZZ_RECORDER_DIR in deploy/.env}
        target: /workspace/hotfuzz_output
        bind:
          create_host_path: true
      - hotfuzz-build-cache:/workspace/.hotfuzz-build
    stdin_open: true
    tty: true

volumes:
  hotfuzz-build-cache:
